<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Context Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">Files</div>
            <div id="fileTree"></div>
        </div>
        <div class="main">
            <div class="breadcrumb" id="breadcrumb"></div>
            <div class="toolbar">
                <button id="confirmBtn" disabled>✓ Confirm Selection</button>
                <button id="clearBtn" onclick="clearSelection()">✕ Clear Selection</button>
                <span id="selectionInfo" class="selection-info"></span>
            </div>
            <div class="voice-bar">
                <button id="micBtn" onclick="toggleVoiceInput()" title="Start voice query">🎤</button>
                <input type="text" id="voiceQueryInput" placeholder="Voice query — click 🎤 and speak, or type here" />
                <button id="voiceConfirmBtn" onclick="confirmSelection()" title="Confirm selection with voice query">✓ Confirm</button>
                <button id="speakBtn" onclick="speakLastResponse()" title="Read last Claude response aloud">🔊</button>
                <button id="stopSpeakBtn" onclick="stopSpeaking()" title="Stop speaking" style="display:none">⏹</button>
            </div>
            <div class="hint">
                Click to toggle line, shift-click to select a range, drag to select a block.
                Double-click selects a paragraph. Option/Alt-click selects an indent block.
            </div>
            <div class="content" id="content">
                <div style="color: #888; text-align: center; margin-top: 40px;">Select a file to view</div>
            </div>
            <div class="confirmation-bar" id="confirmationBar">
                <span id="confirmationText">Selection confirmed</span>
                <span id="voiceQueryConfirm" class="voice-query-confirm"></span>
            </div>
            <pre id="debugSelection" class="debug-selection"></pre>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
